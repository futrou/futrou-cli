name: Release Run

on:
  workflow_call:
    inputs:
      version_tag:
        description: 'NPM version tag (e.g., latest, next)'
        required: false
        type: string
        default: 'latest'
      release_tag:
        description: 'Git tag of the release (e.g. v2.0.5). Defaults to GITHUB_REF_NAME when triggered by a release event.'
        required: false
        type: string
        default: ''

env:
  DEBIAN_FRONTEND: noninteractive
  GO_VERSION: '1.25.x'
  NODE_VERSION: '24.x'

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: main

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag != '' && format('v{0}', inputs.release_tag) || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config --global --add safe.directory $(pwd)
          git config --global user.email "bot@futrou.com"
          git config --global user.name "Futrou Bot"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Set version from release tag
        if: inputs.version_tag == 'latest'
        run: |
          TAG="${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}"
          ./scripts/version.sh set ${TAG#v}

      - name: Set version to tag + commit hash + timestamp
        if: inputs.version_tag != 'latest'
        run: |
          TAG="${{ inputs.version_tag }}"
          COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%s)
          ./scripts/version.sh tag "${TAG}-${COMMIT_HASH}-${TIMESTAMP}"

      - name: Install dependencies
        run: make install

      - name: Build all platforms
        run: make build

      - name: Test before release
        run: make test

      - name: Upload release artifacts
        if: inputs.version_tag == 'latest'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag != '' && format('v{0}', inputs.release_tag) || github.ref_name }}
          generate_release_notes: true
          draft: true
          files: dist/*

      - name: Publish release
        if: inputs.version_tag == 'latest'
        run: |
          TAG="${{ inputs.release_tag != '' && format('v{0}', inputs.release_tag) || github.ref_name }}"
          RELEASE_ID=$(gh api repos/$GITHUB_REPOSITORY/releases --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -1)
          gh api repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID \
            --method PATCH \
            --field draft=false
          echo "Published release $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: cd dist-npm && npm publish --provenance --access public --tag=${{ inputs.version_tag }}

  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: release
    if: inputs.version_tag == 'latest'

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Configure git
        run: |
          git config user.name "Futrou Bot"
          git config user.email "bot@futrou.com"

      - name: Bump patch version
        run: ./scripts/version.sh bump

      - name: Commit and push
        run: |
          git add .env
          git commit -m "Bump version"
          git push origin main || (git pull origin main --rebase && git push origin main)
