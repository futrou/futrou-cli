name: Auto Release

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9am UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.0.5). Leave empty to use version from .env'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  auto-release:
    name: Auto Release
    runs-on: ubuntu-slim
    timeout-minutes: 30
    outputs:
      needed: ${{ steps.check.outputs.needed }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Futrou Bot"
          git config user.email "bot@futrou.com"

      - name: Check if release is needed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "reason=manually triggered" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "reason=no previous release" >> $GITHUB_OUTPUT
          else
            CUTOFF=$(date -d '7 days ago' +%s)
            OLDEST_COMMIT_DATE=$(git log --format="%ct" "${LAST_TAG}..HEAD" | tail -1)
            COMMIT_COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")

            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "needed=false" >> $GITHUB_OUTPUT
              echo "reason=no commits since last release" >> $GITHUB_OUTPUT
            elif [ -n "$OLDEST_COMMIT_DATE" ] && [ "$OLDEST_COMMIT_DATE" -lt "$CUTOFF" ]; then
              echo "needed=true" >> $GITHUB_OUTPUT
              echo "reason=commits older than 7 days since last release" >> $GITHUB_OUTPUT
            else
              echo "needed=false" >> $GITHUB_OUTPUT
              echo "reason=all commits are recent, no action needed" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next patch version
        id: version
        if: steps.check.outputs.needed == 'true'
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            NEXT="v${INPUT_VERSION#v}"
          else
            ENV_VERSION=$(grep '^VERSION=' .env | cut -d= -f2 | tr -d '"' | tr -d "'")
            if [ -n "$ENV_VERSION" ]; then
              NEXT="v${ENV_VERSION}"
            else
              LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              VERSION=${LAST_TAG#v}
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.check.outputs.needed == 'true'
        run: |
          echo "Releasing ${{ steps.version.outputs.tag }} — ${{ steps.check.outputs.reason }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.check.outputs.needed == 'true'
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    name: Run Release Pipeline
    needs: auto-release
    if: needs.auto-release.outputs.needed == 'true'
    uses: ./.github/workflows/release-run.yml
    with:
      version_tag: 'latest'
    secrets: inherit
