name: Release

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9am UTC
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.0.5). Leave empty to use version from .env'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-slim
    timeout-minutes: 30
    outputs:
      needed: ${{ steps.check.outputs.needed }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Futrou Bot"
          git config user.email "bot@futrou.com"

      - name: Check if release is needed
        id: check
        run: |
          # A published GitHub release or manual trigger always proceeds
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "reason=${{ github.event_name == 'release' && 'github release published' || 'manually triggered' }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "reason=no previous release" >> $GITHUB_OUTPUT
          else
            CUTOFF=$(date -d '7 days ago' +%s)
            OLDEST_COMMIT_DATE=$(git log --format="%ct" "${LAST_TAG}..HEAD" | tail -1)
            COMMIT_COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")

            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "needed=false" >> $GITHUB_OUTPUT
              echo "reason=no commits since last release" >> $GITHUB_OUTPUT
            elif [ -n "$OLDEST_COMMIT_DATE" ] && [ "$OLDEST_COMMIT_DATE" -lt "$CUTOFF" ]; then
              echo "needed=true" >> $GITHUB_OUTPUT
              echo "reason=commits older than 7 days since last release" >> $GITHUB_OUTPUT
            else
              echo "needed=false" >> $GITHUB_OUTPUT
              echo "reason=all commits are recent, no action needed" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        if: steps.check.outputs.needed == 'true'
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Use the tag that was just published
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            exit 0
          fi

          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            NEXT="v${INPUT_VERSION#v}"
          else
            ENV_VERSION=$(grep '^VERSION=' .env | cut -d= -f2 | tr -d '"' | tr -d "'")
            if [ -n "$ENV_VERSION" ]; then
              NEXT="v${ENV_VERSION}"
            else
              LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              VERSION=${LAST_TAG#v}
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.check.outputs.needed == 'true' && github.event_name != 'release'
        run: |
          echo "Releasing ${{ steps.version.outputs.tag }} — ${{ steps.check.outputs.reason }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.check.outputs.needed == 'true' && github.event_name != 'release'
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # If a published release for this tag already exists, skip
          EXISTING=$(gh release view "$TAG" --json isDraft -q '.isDraft' 2>/dev/null || echo "")
          if [ "$EXISTING" = "false" ]; then
            echo "Published release $TAG already exists — skipping"
            exit 0
          fi

          # Use existing draft (release-drafter creates these without a tag), or create fresh
          DRAFT_ID=$(gh api repos/$GITHUB_REPOSITORY/releases --jq '.[] | select(.draft) | .id' | head -1)
          if [ -n "$DRAFT_ID" ]; then
            echo "Draft release found (id=$DRAFT_ID) — updating to $TAG"
            gh api repos/$GITHUB_REPOSITORY/releases/$DRAFT_ID \
              --method PATCH \
              --field tag_name="$TAG" \
              --field name="$TAG" \
              --field draft=false
          else
            echo "Creating new release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    name: Run Release Pipeline
    needs: prepare
    if: needs.prepare.outputs.needed == 'true'
    uses: ./.github/workflows/release-run.yml
    with:
      version_tag: 'latest'
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit
