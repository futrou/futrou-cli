name: Mirror

on:
  push:
    branches: [main]

jobs:
  mirror:
    name: Mirror to GitLab
    runs-on: ubuntu-slim
    timeout-minutes: 10
    environment: main

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to gitlab.com/futrou/futrou-cli.git
        env:
          GITLAB_SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          echo "$GITLAB_SSH_KEY" > "$KEY_FILE"
          export GIT_SSH_COMMAND="ssh -i $KEY_FILE -o StrictHostKeyChecking=no -o IdentitiesOnly=yes"

          git remote add gitlab git@gitlab.com:futrou/futrou-cli.git
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote gitlab refs/heads/main | awk '{print $1}')

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Already in sync, skipping push."
            rm -f "$KEY_FILE"
            exit 0
          fi
          echo "Local:  $LOCAL"
          echo "Remote: $REMOTE"
          git push gitlab main
          rm -f "$KEY_FILE"
