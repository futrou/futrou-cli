name: Mirror

on:
  push:
    branches: [main]

jobs:
  mirror:
    name: Mirror to GitLab
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        env:
          GIT_SSH_COMMAND: "ssh -i ${{ secrets.GITLAB_SSH_KEY }} -o StrictHostKeyChecking=no"
        run: |
          git remote add gitlab git@gitlab.com:futrou/futrou-cli.git
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote gitlab refs/heads/main | awk '{print $1}')
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Already in sync, skipping push."
            exit 0
          fi
          echo "Local:  $LOCAL"
          echo "Remote: $REMOTE"
          git push gitlab main
