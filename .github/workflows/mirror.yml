name: Mirror

on:
  push:
    branches: [main]


jobs:
  mirror:
    name: Mirror to GitLab
    runs-on: ubuntu-slim
    timeout-minutes: 30
    environment: main
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "${{ secrets.GITLAB_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          printf 'Host gitlab.com\n\tHostName gitlab.com\n\tIdentityFile ~/.ssh/key\n\tIdentitiesOnly yes\n' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Mirror to gitlab.com/futrou/futrou-cli.git
        run: |
          git remote add gitlab git@gitlab.com:futrou/futrou-cli.git
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote gitlab refs/heads/main | awk '{print $1}')
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Already in sync, skipping push."
            exit 0
          fi
          echo "Local:  $LOCAL"
          echo "Remote: $REMOTE"
          if ! git push gitlab main; then
            git fetch gitlab main
            GITLAB_HEAD=$(git rev-parse FETCH_HEAD)
            if git merge-base --is-ancestor "$GITLAB_HEAD" HEAD; then
              # GitLab is behind — safe to force push
              git push gitlab main --force
            else
              # Histories diverged — try rebase first
              git pull gitlab main --rebase && git push gitlab main || git push gitlab main --force
            fi
          fi
