name: Release Drafter

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-slim
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Draft release with commits since last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${LAST_TAG}..HEAD")
          fi

          BODY="**Changes**

          ${COMMITS}"

          gh release delete draft --yes 2>/dev/null || true
          gh release create draft --draft --title "Draft" --notes "${BODY}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
