name: Release Drafter

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-slim
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Draft release with commits since last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h) @%an" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h) @%an" "${LAST_TAG}..HEAD")
          fi

          BODY="**Changes**

          ${COMMITS}"

          DRAFT_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.draft == true) | .id' | head -1)

          if [ -n "$DRAFT_ID" ]; then
            gh api repos/${{ github.repository }}/releases/${DRAFT_ID} \
              -X PATCH -f body="${BODY}" > /dev/null
          else
            gh api repos/${{ github.repository }}/releases \
              -X POST -f tag_name="" -f name="Draft" -f body="${BODY}" -F draft=true > /dev/null
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
