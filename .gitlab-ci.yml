image: alpine:latest

variables:
    DEBIAN_FRONTEND: noninteractive

stages:
    - mirror

mirror:
    stage: mirror
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_TAG
    tags:
        - arm64
    allow_failure: true
    before_script:
        - apk add --no-cache git openssh-client
    script:
        - mkdir -p ~/.ssh
        - ssh-keyscan github.com >> ~/.ssh/known_hosts
        - chmod 644 ~/.ssh/known_hosts
        - printf '%b' "$GITHUB_SSH_KEY" > ~/.ssh/key
        - chmod 600 ~/.ssh/key
        - wc -l ~/.ssh/key
        - head -1 ~/.ssh/key
        - tail -1 ~/.ssh/key
        - printf 'Host github.com\n\tHostName github.com\n\tIdentityFile ~/.ssh/key\n\tIdentitiesOnly yes\n' >> ~/.ssh/config
        - chmod 600 ~/.ssh/config
        - git remote add github git@github.com:futrou/futrou-cli.git
        - git fetch --tags
        - git fetch github --tags
        - |
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git ls-remote github refs/heads/main | awk '{print $1}')
            echo "Local:  $LOCAL"
            echo "Remote: $REMOTE"
            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "Already in sync, skipping push."
              exit 0
            fi
            git push github HEAD:main || (git pull github main --rebase && git push github HEAD:main)
            git push github --tags
