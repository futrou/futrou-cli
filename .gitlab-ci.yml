image: golang:1.25.6

variables:
    GOPATH: $CI_PROJECT_DIR/.go
    GOMODCACHE: $GOPATH/pkg/mod
    GOCACHE: $CI_PROJECT_DIR/.gocache
    DEBIAN_FRONTEND: noninteractive

cache:
    key:
        files:
            - go.sum
    paths:
        - .go/pkg/mod/
        - .gocache/

stages:
    - test

test:
    stage: test
    rules:
        - if: $CI_COMMIT_TAG == null
    script:
        - make install
        - make build
        - make test
